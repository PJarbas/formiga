<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamandua Kanban</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c222b;
      --line: #21262d;
      --line-2: #30363d;
      --ink: #c9d1d9;
      --ink-soft: #8b949e;
      --ink-strong: #e6edf3;
      --accent: #f0883e;
      --todo: #8b949e;
      --running: #d29922;
      --done: #3fb950;
      --failed: #f85149;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    header.bar {
      background: var(--panel);
      border-bottom: 1px solid var(--line-2);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: baseline; gap: 12px; }
    .brand h1 { font-size: 20px; font-weight: 600; color: var(--accent); }
    .brand .subtitle { font-size: 13px; color: var(--ink-soft); }
    .brand a.back {
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid var(--line-2);
      padding: 4px 10px;
      border-radius: 999px;
      margin-left: 12px;
    }
    .brand a.back:hover { color: var(--ink-strong); border-color: var(--ink-soft); }

    .meta {
      display: flex;
      gap: 28px;
      margin-left: auto;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta .stat { display: flex; flex-direction: column; line-height: 1.1; }
    .meta .stat .label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .meta .stat .value {
      font-size: 22px;
      font-weight: 600;
      color: var(--ink-strong);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .meta .stat.run .value { font-size: 13px; color: var(--ink); font-weight: 500; }
    .meta .pulse {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--running); margin-right: 8px;
      animation: pulse 1.8s infinite;
      display: inline-block;
      vertical-align: middle;
    }
    .meta .pulse.todo { background: var(--todo); animation: none; }
    .meta .pulse.done { background: var(--done); animation: none; }
    .meta .pulse.failed { background: var(--failed); animation: none; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(210, 153, 34, 0); }
      100% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0); }
    }

    main.board {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(var(--lanes, 6), minmax(0, 1fr));
      gap: 14px;
      padding: 20px 24px 28px;
      overflow: hidden;
      min-height: 0;
    }
    .lane {
      background: var(--panel);
      border: 1px solid var(--line-2);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .lane-head {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--line-2);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .lane-name {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lane-name .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--todo);
    }
    .lane-name.running .dot { background: var(--running); }
    .lane-name.done    .dot { background: var(--done); }
    .lane-name.failed  .dot { background: var(--failed); }
    .lane-sub {
      font-size: 11px;
      color: var(--ink-soft);
    }
    .cards {
      flex: 1 1 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      min-height: 0;
    }
    .card {
      background: var(--panel-2);
      border: 1px solid var(--line-2);
      border-left: 3px solid var(--todo);
      border-radius: 8px;
      padding: 9px 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 120ms ease;
    }
    .card.running { border-left-color: var(--running); animation: card-pulse 2.4s infinite ease-in-out; }
    .card.done    { border-left-color: var(--done); }
    .card.failed  { border-left-color: var(--failed); }
    @keyframes card-pulse {
      0%, 100% { background: var(--panel-2); }
      50%      { background: #2a2410; }
    }
    .card .id-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      font-weight: 500;
    }
    .card .id-row .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--todo);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .card.running .id-row .dot { background: var(--running); }
    .card.done    .id-row .dot { background: var(--done); }
    .card.failed  .id-row .dot { background: var(--failed); }
    .card .title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-strong);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .card-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--line-2);
      background: transparent;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      margin: 2px 0;
      align-self: flex-start;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
      font-family: inherit;
    }
    .card-toggle-btn:hover {
      border-color: var(--accent);
      color: var(--ink-strong);
      background: var(--panel);
    }
    .card-toggle-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    /* ── Card detail (rendered inside the modal) ── */
    .card-detail {
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-size: 12.5px;
    }
    /* ── Card detail modal ── */
    .card-detail-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card-detail-modal.open { display: flex; }
    .card-detail-modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(1, 4, 9, 0.72);
      backdrop-filter: blur(2px);
      animation: modal-fade 140ms ease-out;
    }
    .card-detail-modal-window {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line-2);
      border-radius: 12px;
      width: min(720px, 100%);
      max-height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
      animation: modal-scale 140ms ease-out;
    }
    @keyframes modal-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes modal-scale {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-detail-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line-2);
      gap: 12px;
      flex: 0 0 auto;
    }
    .card-detail-modal-id {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-strong);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .card-detail-modal-id .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--todo);
    }
    .card-detail-modal-id.running .dot { background: var(--running); }
    .card-detail-modal-id.done    .dot { background: var(--done); }
    .card-detail-modal-id.failed  .dot { background: var(--failed); }
    .card-detail-modal-status {
      font-size: 11px;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-detail-modal-close {
      background: transparent;
      border: 1px solid var(--line-2);
      color: var(--ink-soft);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    .card-detail-modal-close:hover {
      border-color: var(--accent);
      color: var(--ink-strong);
      background: var(--panel-2);
    }
    .card-detail-modal-close:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .card-detail-modal-body {
      padding: 16px 18px 20px;
      overflow-y: auto;
      flex: 1 1 auto;
      min-height: 0;
    }
    .card-detail-modal-body .detail-prompt-text,
    .card-detail-modal-body .detail-task-text,
    .card-detail-modal-body .detail-output-text,
    .card-detail-modal-body .detail-failure-text {
      max-height: 320px;
      font-size: 12px;
    }
    .detail-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    /* ── Collapsible detail sections (Prompt / Task / Output) ── */
    details.detail-collapsible {
      gap: 0;
    }
    details.detail-collapsible > summary.detail-summary {
      list-style: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      padding: 2px 0;
      align-self: flex-start;
      border-radius: 4px;
    }
    details.detail-collapsible > summary.detail-summary::-webkit-details-marker {
      display: none;
    }
    details.detail-collapsible > summary.detail-summary::marker {
      display: none;
    }
    .detail-chevron {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid var(--ink-soft);
      border-bottom: 1.5px solid var(--ink-soft);
      transform: rotate(-45deg);
      transition: transform 140ms ease, border-color 140ms ease;
      flex-shrink: 0;
      margin-right: 2px;
    }
    details.detail-collapsible[open] > summary.detail-summary .detail-chevron {
      transform: rotate(45deg);
    }
    details.detail-collapsible > summary.detail-summary:hover .detail-label {
      color: var(--ink-strong);
    }
    details.detail-collapsible > summary.detail-summary:hover .detail-chevron {
      border-color: var(--ink-strong);
    }
    details.detail-collapsible > summary.detail-summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .detail-collapse-body {
      margin-top: 6px;
    }
    .detail-value {
      color: var(--ink);
      line-height: 1.45;
    }
    .detail-prompt-text,
    .detail-task-text,
    .detail-output-text,
    .detail-failure-text {
      margin: 0;
      padding: 6px 8px;
      background: #0d1117;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.45;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow-y: auto;
    }
    .detail-failure-text {
      color: var(--failed);
      border-color: rgba(248, 81, 73, 0.3);
      background: rgba(248, 81, 73, 0.06);
    }
    .detail-list {
      margin: 0;
      padding-left: 16px;
      color: var(--ink);
      line-height: 1.5;
    }
    .detail-loading {
      color: var(--ink-soft);
      font-style: italic;
      padding: 4px 0;
      animation: loading-blink 1.2s ease-in-out infinite;
    }
    @keyframes loading-blink {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1.0; }
    }
    .detail-placeholder {
      color: var(--ink-soft);
      font-style: italic;
    }
    .detail-error {
      color: var(--failed);
      font-size: 11px;
      padding: 4px 0;
    }
    .card .meta-row {
      font-size: 10.5px;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    .lane-foot {
      border-top: 1px solid var(--line-2);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      gap: 12px;
    }
    .lane-foot .progress {
      flex: 1 1 auto;
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .lane-foot .progress .fill {
      position: absolute; inset: 0 auto 0 0;
      background: var(--done);
      width: 0%;
      transition: width 200ms ease;
    }
    .lane-foot .progress.failed .fill { background: var(--failed); }
    .lane-foot .progress.running .fill { background: var(--running); }

    footer.status {
      border-top: 1px solid var(--line-2);
      padding: 10px 24px;
      font-size: 11px;
      color: var(--ink-soft);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.04em;
      background: var(--panel);
    }
    footer.status .err { color: var(--failed); font-weight: 500; }

    @media (max-width: 1100px) {
      main.board { grid-template-columns: repeat(3, minmax(0, 1fr)); overflow-y: auto; }
    }
    @media (max-width: 720px) {
      main.board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      header.bar { padding: 14px 16px; gap: 16px; }
      .meta { gap: 18px; width: 100%; margin-left: 0; }
      .meta .stat .value { font-size: 18px; }
    }
    @media (max-width: 480px) {
      main.board { grid-template-columns: 1fr; padding: 14px; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <h1>Tamandua</h1>
      <span class="subtitle">workflow kanban</span>
      <a href="/" class="back">← all runs</a>
    </div>
    <div class="meta">
      <div class="stat run">
        <div class="label">Run</div>
        <div class="value" id="run-id">—</div>
      </div>
      <div class="stat">
        <div class="label">Status</div>
        <div class="value" id="run-status">
          <span class="pulse" id="run-pulse"></span><span id="run-status-text">—</span>
        </div>
      </div>
      <div class="stat">
        <div class="label">Elapsed</div>
        <div class="value" id="elapsed">—</div>
      </div>
      <div class="stat">
        <div class="label">Tokens</div>
        <div class="value" id="tokens">—</div>
      </div>
    </div>
  </header>

  <main class="board" id="board"><!-- lanes injected --></main>

  <div id="card-detail-modal" class="card-detail-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="card-detail-modal-title">
    <div class="card-detail-modal-overlay" data-modal-close></div>
    <div class="card-detail-modal-window" role="document">
      <header class="card-detail-modal-header">
        <div class="card-detail-modal-id" id="card-detail-modal-title">
          <span class="dot"></span>
          <span class="card-detail-modal-id-text">—</span>
          <span class="card-detail-modal-status"></span>
        </div>
        <button type="button" class="card-detail-modal-close" aria-label="Close" data-modal-close>×</button>
      </header>
      <div class="card-detail-modal-body" id="card-detail-modal-body"></div>
    </div>
  </div>

  <footer class="status">
    <span id="footer-left">connecting…</span>
    <span id="footer-right">
      <label>
        <input type="checkbox" id="poll-toggle" checked>
        <span id="poll-label">poll 3s</span>
      </label>
    </span>
  </footer>

<script>
(function () {
  const REFRESH_MS = 3000;
  const runId = window.location.pathname.split("/")[2];

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
    }[c]));
  }

  function fmtElapsed(sec) {
    sec = Math.max(0, Math.floor(sec));
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h) return h + "h " + String(m).padStart(2, "0") + "m";
    if (m) return m + "m " + String(s).padStart(2, "0") + "s";
    return s + "s";
  }

  function fmtTokens(n) {
    if (n == null) return "—";
    const v = Number(n);
    if (!Number.isFinite(v)) return "—";
    if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
    if (v >= 1e3) return (v / 1e3).toFixed(1) + "k";
    return String(v);
  }

  function parseTimestamp(ts) {
    if (!ts) return NaN;
    // Tamandua mixes ISO-Z and naive space-separated UTC strings.
    const iso = /Z$/.test(ts) ? ts : ts.replace(" ", "T") + "Z";
    return Date.parse(iso);
  }

  function fmtTime(ts) {
    const t = parseTimestamp(ts);
    if (!Number.isFinite(t)) return "";
    return new Date(t).toLocaleTimeString([], {
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
  }

  function renderHeader(snapshot) {
    const run = snapshot.run;
    const idChip = run.workflow_id + " #" + (run.run_number ?? "?") +
      " · " + String(run.id).slice(0, 8);
    document.getElementById("run-id").textContent = idChip;
    document.getElementById("run-status-text").textContent = run.status;
    const pulse = document.getElementById("run-pulse");
    pulse.className = "pulse " + statusBucket(run.status);

    const createdMs = parseTimestamp(run.created_at);
    document.getElementById("elapsed").textContent =
      Number.isFinite(createdMs) ? fmtElapsed((Date.now() - createdMs) / 1000) : "—";
    document.getElementById("tokens").textContent = fmtTokens(run.tokens_spent);
  }

  function statusBucket(raw) {
    const s = String(raw || "").toLowerCase();
    if (s === "running") return "running";
    if (s === "done" || s === "completed") return "done";
    if (s === "failed" || s === "canceled" || s === "cancelled") return "failed";
    return "todo";
  }

  function renderBoard(snapshot) {
    const board = document.getElementById("board");
    board.style.setProperty("--lanes", String(Math.max(1, snapshot.lanes.length)));
    board.innerHTML = "";
    for (const lane of snapshot.lanes) {
      const laneEl = document.createElement("section");
      laneEl.className = "lane";

      const head = document.createElement("div");
      head.className = "lane-head";
      const itemWord = lane.summary.total === 1 ? "item" : "items";
      head.innerHTML =
        '<div class="lane-name ' + lane.status + '">' +
        '<span class="dot"></span>' + escapeHtml(lane.label) +
        '</div>' +
        '<div class="lane-sub">' + lane.summary.total + ' ' + itemWord +
        ' · ' + escapeHtml(lane.stepType) + '</div>';
      laneEl.appendChild(head);

      const cardsEl = document.createElement("div");
      cardsEl.className = "cards";
      if (lane.cards.length === 0) {
        const empty = document.createElement("div");
        empty.className = "card";
        empty.innerHTML = '<div class="title" style="color:var(--ink-soft)">—</div>';
        cardsEl.appendChild(empty);
      } else {
        for (const c of lane.cards) {
          const cardEl = document.createElement("div");
          cardEl.className = "card " + c.status;
          cardEl.setAttribute("data-card-id", c.id);
          cardEl.innerHTML =
            '<div class="id-row">' +
              '<span><span class="dot"></span>' + escapeHtml(c.id) + '</span>' +
              '<span>' + escapeHtml(c.status) + '</span>' +
            '</div>' +
            '<button class="card-toggle-btn" aria-label="Expand card">+</button>' +
            '<div class="title">' + escapeHtml(c.title) + '</div>' +
            '<div class="meta-row">' + escapeHtml(c.sub) + '</div>';
          cardsEl.appendChild(cardEl);
        }
      }
      laneEl.appendChild(cardsEl);

      const total = lane.summary.total;
      const done = lane.summary.done;
      const failed = lane.summary.failed;
      const running = lane.summary.running;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const progressClass = failed > 0 ? "failed" : (running > 0 ? "running" : "");
      const progressWidth = failed > 0 ? 100 : pct;

      const foot = document.createElement("div");
      foot.className = "lane-foot";
      foot.innerHTML =
        '<span>' + done + '/' + total + ' done' +
        (failed ? ' · ' + failed + ' failed' : '') + '</span>' +
        '<div class="progress ' + progressClass + '">' +
          '<div class="fill" style="width:' + progressWidth + '%"></div>' +
        '</div>' +
        '<span>' + pct + '%</span>';
      laneEl.appendChild(foot);

      board.appendChild(laneEl);
    }
  }

  let lastGoodAt = null;
  const expandedCardIds = new Set();
  // Tracks which collapsible sections (by label) the user has manually
  // collapsed; survives polling re-renders so the user's choice sticks.
  const collapsedSections = new Set();

  // ── Card expansion helpers ────────────────────────────────────

  function fmtDuration(ms) {
    if (ms == null || !Number.isFinite(ms)) return "—";
    ms = Math.max(0, Math.round(ms));
    if (ms >= 60000) {
      const m = Math.floor(ms / 60000);
      const s = Math.round((ms % 60000) / 1000);
      return s ? m + "m " + s + "s" : m + "m";
    }
    if (ms >= 1000) return (ms / 1000).toFixed(1) + "s";
    return ms + "ms";
  }

  function createDetailSection(detail, isLoading) {
    const div = document.createElement("div");
    div.className = "card-detail";

    if (isLoading) {
      div.innerHTML = '<div class="detail-loading">Loading…</div>';
      return div;
    }

    if (!detail) {
      div.innerHTML = '<div class="detail-error">No detail available</div>';
      return div;
    }

    const parts = [];

    // Prompt — always shown, collapsible
    parts.push(
      '<details class="detail-section detail-collapsible" open>',
      '<summary class="detail-summary">',
      '<span class="detail-chevron" aria-hidden="true"></span>',
      '<span class="detail-label">Prompt</span>',
      '</summary>',
      '<div class="detail-collapse-body">',
      detail.input_template
        ? '<pre class="detail-prompt-text">' + escapeHtml(detail.input_template) + '</pre>'
        : '<div class="detail-placeholder detail-value">—</div>',
      '</div>',
      '</details>'
    );

    // Task context — collapsible, same formatting as Prompt
    if (detail.task) {
      parts.push(
        '<details class="detail-section detail-collapsible" open>',
        '<summary class="detail-summary">',
        '<span class="detail-chevron" aria-hidden="true"></span>',
        '<span class="detail-label">Task</span>',
        '</summary>',
        '<div class="detail-collapse-body">',
        '<pre class="detail-task-text">', escapeHtml(detail.task), '</pre>',
        '</div>',
        '</details>'
      );
    }

    // Description (story cards)
    if (detail.description) {
      parts.push(
        '<div class="detail-section">',
        '<div class="detail-label">Description</div>',
        '<div class="detail-value">', escapeHtml(detail.description), '</div>',
        '</div>'
      );
    }

    // Acceptance criteria
    if (detail.acceptanceCriteria && detail.acceptanceCriteria.length > 0) {
      parts.push(
        '<div class="detail-section">',
        '<div class="detail-label">Acceptance Criteria</div>',
        '<ul class="detail-list">'
      );
      for (const ac of detail.acceptanceCriteria) {
        parts.push('<li>', escapeHtml(ac), '</li>');
      }
      parts.push('</ul></div>');
    }

    // Timing — always shown
    parts.push(
      '<div class="detail-section">',
      '<div class="detail-label">Timing</div>',
      '<div class="detail-value">',
      escapeHtml(detail.timing ? fmtDuration(detail.timing.durationMs) : '—'),
      '</div>',
      '</div>'
    );

    // Tokens — always shown
    const hasTokens = detail.tokens && detail.tokens.total > 0;
    parts.push(
      '<div class="detail-section">',
      '<div class="detail-label">Tokens</div>',
      '<div class="detail-value">', escapeHtml(hasTokens ? fmtTokens(detail.tokens.total) : '—'));
    if (hasTokens && detail.tokens.deltas && detail.tokens.deltas.length > 0) {
      parts.push(' <span style="color:var(--ink-soft)">(',
        String(detail.tokens.deltas.length), ' update',
        detail.tokens.deltas.length === 1 ? '' : 's', ')</span>');
    }
    parts.push('</div></div>');

    // Retry info
    if ((detail.retryCount ?? 0) > 0 || (detail.maxRetries ?? 0) > 0) {
      parts.push(
        '<div class="detail-section">',
        '<div class="detail-label">Retries</div>',
        '<div class="detail-value">',
        String(detail.retryCount ?? 0), ' / ', String(detail.maxRetries ?? 4),
        '</div></div>'
      );
    }

    // Failure detail
    if (detail.failureDetail) {
      parts.push(
        '<div class="detail-section detail-failure">',
        '<div class="detail-label">Failure Reason</div>',
        '<pre class="detail-failure-text">', escapeHtml(detail.failureDetail), '</pre>',
        '</div>'
      );
    }

    // Output — collapsible
    if (detail.output) {
      parts.push(
        '<details class="detail-section detail-collapsible" open>',
        '<summary class="detail-summary">',
        '<span class="detail-chevron" aria-hidden="true"></span>',
        '<span class="detail-label">Output</span>',
        '</summary>',
        '<div class="detail-collapse-body">',
        '<pre class="detail-output-text">', escapeHtml(detail.output), '</pre>',
        '</div>',
        '</details>'
      );
    }

    div.innerHTML = parts.join("");
    return div;
  }

  function createErrorSection(msg) {
    const div = document.createElement("div");
    div.className = "card-detail";
    div.innerHTML = '<div class="detail-error">Fetch failed: ' + escapeHtml(msg) + '</div>';
    return div;
  }

  // ── Modal helpers ─────────────────────────────────────────────

  const modalEl = document.getElementById("card-detail-modal");
  const modalBodyEl = document.getElementById("card-detail-modal-body");
  const modalIdEl = modalEl.querySelector(".card-detail-modal-id");
  const modalIdTextEl = modalEl.querySelector(".card-detail-modal-id-text");
  const modalStatusEl = modalEl.querySelector(".card-detail-modal-status");
  let lastFocusedToggleBtn = null;

  function setToggleButtonState(cardEl, expanded) {
    const btn = cardEl.querySelector(".card-toggle-btn");
    if (!btn) return;
    if (expanded) {
      btn.textContent = "−";
      btn.setAttribute("aria-label", "Collapse card");
      btn.setAttribute("aria-expanded", "true");
    } else {
      btn.textContent = "+";
      btn.setAttribute("aria-label", "Expand card");
      btn.setAttribute("aria-expanded", "false");
    }
  }

  function syncToggleButtons() {
    const cards = document.getElementById("board").querySelectorAll(".card[data-card-id]");
    for (const cardEl of cards) {
      const cid = cardEl.getAttribute("data-card-id");
      setToggleButtonState(cardEl, cid && expandedCardIds.has(cid));
    }
  }

  function findCardEl(cardId) {
    return document.getElementById("board").querySelector(
      '[data-card-id="' + cardId.replace(/"/g, '\\"') + '"]'
    );
  }

  function updateModalHeader(cardId) {
    modalIdTextEl.textContent = cardId;
    const cardEl = findCardEl(cardId);
    const status = cardEl
      ? (cardEl.classList.contains("running") ? "running"
        : cardEl.classList.contains("done") ? "done"
        : cardEl.classList.contains("failed") ? "failed"
        : "todo")
      : "todo";
    modalIdEl.classList.remove("running", "done", "failed", "todo");
    modalIdEl.classList.add(status);
    modalStatusEl.textContent = status;
  }

  function showModal() {
    modalEl.classList.add("open");
    modalEl.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function hideModal() {
    modalEl.classList.remove("open");
    modalEl.setAttribute("aria-hidden", "true");
    modalBodyEl.innerHTML = "";
    document.body.style.overflow = "";
  }

  function applyCollapsedState(container) {
    const items = container.querySelectorAll("details.detail-collapsible");
    for (const det of items) {
      const labelEl = det.querySelector(".detail-label");
      const label = labelEl ? labelEl.textContent.trim() : "";
      if (label && collapsedSections.has(label)) {
        det.open = false;
      }
    }
  }

  async function loadDetailIntoModal(cardId) {
    modalBodyEl.innerHTML = "";
    modalBodyEl.appendChild(createDetailSection(null, true));
    try {
      const apiUrl = "/api/runs/" + encodeURIComponent(runId) +
        "/kanban/card-detail?cardId=" + encodeURIComponent(cardId);
      const r = await fetch(apiUrl, { cache: "no-store" });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error("HTTP " + r.status + " — " + txt.slice(0, 200));
      }
      const detail = await r.json();
      modalBodyEl.innerHTML = "";
      modalBodyEl.appendChild(createDetailSection(detail));
      applyCollapsedState(modalBodyEl);
      return true;
    } catch (err) {
      modalBodyEl.innerHTML = "";
      modalBodyEl.appendChild(createErrorSection(err.message));
      return false;
    }
  }

  // The native `toggle` event does not bubble, so listen in the capture phase
  // to track every collapsible section inside the modal.
  modalBodyEl.addEventListener("toggle", function (e) {
    const det = e.target;
    if (!det || det.tagName !== "DETAILS") return;
    if (!det.classList.contains("detail-collapsible")) return;
    const labelEl = det.querySelector(".detail-label");
    const label = labelEl ? labelEl.textContent.trim() : "";
    if (!label) return;
    if (det.open) {
      collapsedSections.delete(label);
    } else {
      collapsedSections.add(label);
    }
  }, true);

  async function openCardDetail(cardId, opts) {
    const isRefresh = !!(opts && opts.refresh);
    // Only one card can be expanded at a time in the modal.
    expandedCardIds.clear();
    expandedCardIds.add(cardId);
    updateModalHeader(cardId);
    if (!isRefresh) showModal();
    syncToggleButtons();
    const ok = await loadDetailIntoModal(cardId);
    if (!ok && !isRefresh) {
      // Keep the error visible; user can dismiss with Esc / overlay click.
    }
  }

  function closeCardDetail() {
    if (expandedCardIds.size === 0 && !modalEl.classList.contains("open")) return;
    expandedCardIds.clear();
    hideModal();
    syncToggleButtons();
    if (lastFocusedToggleBtn && document.contains(lastFocusedToggleBtn)) {
      try { lastFocusedToggleBtn.focus(); } catch {}
    }
    lastFocusedToggleBtn = null;
  }

  // ── Event delegation for toggle buttons ───────────────────────

  document.getElementById("board").addEventListener("click", async function (e) {
    const btn = e.target.closest(".card-toggle-btn");
    if (!btn) return;
    e.stopPropagation();

    const card = btn.closest(".card");
    if (!card) return;
    const cardId = card.getAttribute("data-card-id");
    if (!cardId) return;

    if (expandedCardIds.has(cardId)) {
      closeCardDetail();
    } else {
      lastFocusedToggleBtn = btn;
      await openCardDetail(cardId);
    }
  });

  // ── Keyboard: Enter / Space on toggle button ──────────────────
  document.getElementById("board").addEventListener("keydown", function (e) {
    if (e.target.matches(".card-toggle-btn") && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      e.target.click();
    }
  });

  // ── Modal dismissal: Esc, overlay click, close button ─────────
  modalEl.addEventListener("click", function (e) {
    if (e.target.closest("[data-modal-close]")) {
      closeCardDetail();
    }
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && modalEl.classList.contains("open")) {
      e.preventDefault();
      closeCardDetail();
    }
  });

  let pollInterval;

  function updatePollLabel() {
    const chk = document.getElementById("poll-toggle");
    const label = document.getElementById("poll-label");
    if (chk && label) {
      label.textContent = chk.checked ? "poll " + (REFRESH_MS / 1000) + "s" : "poll paused";
    }
  }

  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    tick();
    pollInterval = setInterval(tick, REFRESH_MS);
  }

  function stopPolling() {
    if (pollInterval) {
      clearInterval(pollInterval);
      pollInterval = null;
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const chk = document.getElementById("poll-toggle");
    if (chk) {
      updatePollLabel();
      chk.addEventListener("change", function () {
        updatePollLabel();
        if (chk.checked) {
          startPolling();
        } else {
          stopPolling();
        }
      });
    }
  });

  async function tick() {
    if (!runId) {
      document.getElementById("footer-left").innerHTML =
        '<span class="err">no runId in URL — expected /runs/&lt;id&gt;/kanban</span>';
      return;
    }
    try {
      const r = await fetch("/api/runs/" + encodeURIComponent(runId) + "/kanban", {
        cache: "no-store",
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error("HTTP " + r.status + " — " + txt.slice(0, 200));
      }
      const data = await r.json();
      renderHeader(data);
      renderBoard(data);

      // Re-sync expanded card state after the board re-render and refresh the
      // open modal in place (so latest tokens/timing/output show through).
      const missingCardIds = [];
      for (const cardId of expandedCardIds) {
        if (!findCardEl(cardId)) missingCardIds.push(cardId);
      }
      for (const id of missingCardIds) {
        expandedCardIds.delete(id);
      }
      if (expandedCardIds.size === 0 && modalEl.classList.contains("open")) {
        // The expanded card disappeared from the snapshot — close the modal.
        closeCardDetail();
      } else if (expandedCardIds.size > 0) {
        const openCardId = Array.from(expandedCardIds)[0];
        syncToggleButtons();
        // Refresh modal contents in place; do NOT toggle visibility.
        openCardDetail(openCardId, { refresh: true });
      }

      lastGoodAt = new Date();
      document.getElementById("footer-left").textContent =
        "live · refreshed " + lastGoodAt.toLocaleTimeString();
    } catch (e) {
      const last = lastGoodAt ? lastGoodAt.toLocaleTimeString() : "never";
      document.getElementById("footer-left").innerHTML =
        '<span class="err">disconnected</span> · ' + escapeHtml(e.message) +
        ' · last good ' + last;
    }
  }

  startPolling();
})();
</script>
</body>
</html>
