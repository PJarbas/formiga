<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamandua Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.5;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f0883e;
    }
    header .subtitle {
      font-size: 13px;
      color: #8b949e;
    }
    header .token-counters {
      margin: 0 auto;
      font-size: 13px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .token-sep { color: #30363d; }
    header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      margin-left: auto;
    }
    header .status-dot.error { background: #f85149; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .section { margin-bottom: 32px; }
    .section h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid #21262d;
    }
    th {
      color: #8b949e;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tr:hover { background: #161b22; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-running { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb66; }
    .badge-completed { background: #3fb95033; color: #3fb950; border: 1px solid #3fb95066; }
    .badge-failed { background: #f8514933; color: #f85149; border: 1px solid #f8514966; }
    .badge-canceled { background: #8b949e33; color: #8b949e; border: 1px solid #8b949e66; }
    .badge-paused { background: #d2992233; color: #d29922; border: 1px solid #d2992266; }
    .badge-blocked { background: #d2992233; color: #d29922; border: 1px solid #d2992266; }
    .progress-bar {
      width: 120px;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #3fb950;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-fill.running { background: #58a6ff; }
    .events-list {
      max-height: 300px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
    }
    .event-row {
      padding: 4px 8px;
      border-bottom: 1px solid #21262d;
      display: flex;
      gap: 8px;
    }
    .event-ts { color: #8b949e; white-space: nowrap; }
    .event-type { color: #58a6ff; font-weight: 600; min-width: 120px; }
    .event-detail { color: #c9d1d9; }
    .empty-state {
      text-align: center;
      padding: 32px;
      color: #8b949e;
      font-style: italic;
    }
    .refresh-info {
      font-size: 11px;
      color: #484f58;
      text-align: right;
      margin-top: 8px;
    }
    .num { font-family: "SF Mono", "Fira Code", monospace; color: #8b949e; }
    .mono { font-family: "SF Mono", "Fira Code", monospace; }
    a.run-link { color: #58a6ff; text-decoration: none; }
    a.run-link:hover { text-decoration: underline; }
    a.kanban-link {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    a.kanban-link:hover {
      border-color: #f0883e;
      color: #f0883e;
      background: #1c222b;
    }
    .truncate {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .logs-tail-box {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0b0f14;
      color: #c9d1d9;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
    }
    .action-btn {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      font-family: inherit;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .action-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .action-btn.pause-btn:hover { border-color: #d29922; color: #d29922; }
    .action-btn.resume-btn:hover { border-color: #3fb950; color: #3fb950; }
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .controls-bar label.drain-label {
      font-size: 12px;
      color: #8b949e;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    .controls-bar label.drain-label input[type="checkbox"] {
      accent-color: #d29922;
    }
  </style>
</head>
<body>
  <header>
    <h1>&#x1F9FE; Tamandua</h1>
    <span class="subtitle">Workflow Dashboard</span>
    <div class="token-counters" id="token-counters">
      <span>System: <span class="mono" id="system-tokens">0</span></span>
      <span class="token-sep">|</span>
      <span>Total: <span class="mono" id="total-tokens">0</span></span>
    </div>
    <span class="status-dot" id="status-dot" title="Connected"></span>
  </header>

  <div class="container">
    <!-- MCP Status Section -->
    <section class="section">
      <h2>MCP Server</h2>
      <div id="mcp-status-content">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <!-- Runs Section -->
    <section class="section">
      <h2>Workflow Runs</h2>
      <div class="controls-bar">
        <button class="action-btn pause-btn" onclick="pauseAllRuns(false)" title="Pause all running runs">⏸ Pause All</button>
        <button class="action-btn pause-btn" onclick="pauseAllRuns(true)" title="Drain then pause all running runs">⏸ Pause All (Drain)</button>
        <button class="action-btn resume-btn" onclick="resumeAllRuns()" title="Resume all paused runs">▶ Resume All</button>
        <label class="drain-label" title="Wait for in-flight work to complete before pausing individual runs">
          <input type="checkbox" id="drain-checkbox"> Drain
        </label>
        <span id="pause-feedback" style="font-size:11px;color:#8b949e;"></span>
      </div>
      <div id="runs-content">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <!-- Events Section -->
    <section class="section">
      <h2>Recent Events</h2>
      <div id="events-content">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <!-- Logs Tail Section -->
    <section class="section" id="logs-tail-section">
      <h2>Logs Tail</h2>
      <textarea
        id="logs-tail-output"
        class="logs-tail-box"
        readonly
        aria-label="Logs Tail output"
        spellcheck="false"
      ></textarea>
    </section>

    <p class="refresh-info">
      Auto-refreshing every 10s &middot; Last update: <span id="last-update">--</span>
    </p>
  </div>

  <script>
    const STATUS_CLASS = {
      running: "badge-running",
      completed: "badge-completed",
      failed: "badge-failed",
      canceled: "badge-canceled",
      paused: "badge-paused",
      blocked: "badge-blocked",
    };

    let logsTailOffset = 0;

    async function fetchMcpStatus() {
      try {
        const res = await fetch("/api/mcp-status");
        const data = await res.json();
        renderMcpStatus(data);
      } catch (err) {
        console.error("Failed to fetch MCP status:", err);
        document.getElementById("mcp-status-content").innerHTML =
          '<div class="empty-state">Unable to fetch MCP status.</div>';
      }
    }

    function renderMcpStatus(data) {
      const el = document.getElementById("mcp-status-content");
      const { running, port, path } = data;

      const statusDot = running
        ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3fb950;margin-right:6px;" title="Running"></span>'
        : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f85149;margin-right:6px;" title="Stopped"></span>';

      const statusText = running ? "Running" : "Stopped";
      const statusColor = running ? "#3fb950" : "#f85149";

      let html = `<div style="display:flex;align-items:center;gap:16px;font-size:13px;">
        <div>${statusDot}<span style="color:${statusColor};font-weight:600;">${statusText}</span></div>
        <div>Port: <span class="mono">${port}</span></div>
        <div>Endpoint: <span class="mono">http://localhost:${port}${esc(path)}</span></div>
      </div>`;

      el.innerHTML = html;
    }

    async function fetchRuns() {
      try {
        const res = await fetch("/api/runs");
        const data = await res.json();
        renderRuns(data.runs || []);
        document.getElementById("status-dot").classList.remove("error");
      } catch (err) {
        document.getElementById("status-dot").classList.add("error");
        console.error("Failed to fetch runs:", err);
      }
    }

    async function fetchEvents() {
      try {
        const res = await fetch("/api/events?limit=40");
        const data = await res.json();
        renderEvents(data.events || []);
      } catch (err) {
        console.error("Failed to fetch events:", err);
      }
    }

    async function fetchLogsTail() {
      try {
        const res = await fetch(`/api/logs-tail?offset=${logsTailOffset}`);
        const data = await res.json();
        appendLogsTailLines(data.lines || []);
        if (Number.isFinite(data.nextOffset)) {
          logsTailOffset = data.nextOffset;
        }
      } catch (err) {
        console.error("Failed to fetch logs-tail:", err);
      }
    }

    function renderRuns(runs) {
      const el = document.getElementById("runs-content");
      if (!runs.length) {
        el.innerHTML = '<div class="empty-state">No runs yet. Start a workflow to see it here.</div>';
        return;
      }

      const rows = runs.map(r => {
        const total = Number(r.total_steps) || 0;
        const done = Number(r.completed_steps) || 0;
        const failed = Number(r.failed_steps) || 0;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        const isRunning = r.status === "running";
        const fillClass = isRunning ? "running" : "";
        const badgeClass = STATUS_CLASS[r.status] || "badge-running";
        const task = (r.task || "").slice(0, 80);
        const parsedTokens = Number(r.tokens_spent);
        const tokensSpent = Number.isFinite(parsedTokens) ? parsedTokens : 0;

        return `<tr>
          <td class="num">#${r.run_number ?? "-"}</td>
          <td><a class="mono run-link" href="/runs/${encodeURIComponent(r.id)}/kanban" title="Open kanban view">${esc(r.id).slice(0, 8)}</a></td>
          <td>${esc(r.workflow_id)}</td>
          <td class="truncate" title="${esc(r.task || "")}">${esc(task)}</td>
          <td><span class="badge ${badgeClass}">${r.status}</span></td>
          <td>
            <div class="progress-bar" title="${done}/${total} steps (${failed} failed)">
              <div class="progress-fill ${fillClass}" style="width:${pct}%"></div>
            </div>
          </td>
          <td class="num">${tokensSpent}</td>
          <td class="num" style="font-size:11px">${timeAgo(r.updated_at)}</td>
          <td class="actions">
            ${r.status === 'running' ? `<button class="action-btn pause-btn" onclick="event.preventDefault(); handlePause('${r.id}')">⏸ Pause</button>` : ''}
            ${r.status === 'paused' ? `<button class="action-btn resume-btn" onclick="event.preventDefault(); handleResume('${r.id}')">▶ Resume</button>` : ''}
          </td>
          <td><a class="kanban-link" href="/runs/${encodeURIComponent(r.id)}/kanban" aria-label="Open kanban for run ${esc(r.id)}">Kanban &rarr;</a></td>
        </tr>`;
      }).join("");

      el.innerHTML = `<table>
        <thead><tr>
          <th>#</th><th>Run ID</th><th>Workflow</th><th>Task</th><th>Status</th><th>Progress</th><th>Tokens</th><th>Updated</th><th>Actions</th><th>View</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function renderEvents(events) {
      const el = document.getElementById("events-content");
      if (!events.length) {
        el.innerHTML = '<div class="empty-state">No events recorded yet.</div>';
        return;
      }

      const rows = events.map(e => {
        const ts = e.ts ? new Date(e.ts).toLocaleTimeString() : "--";
        const runId = (e.runId || "").slice(0, 8);
        const detail = e.detail || e.stepId || e.agentId || "";
        return `<div class="event-row">
          <span class="event-ts">${ts}</span>
          <span class="event-type">${esc(e.event)}</span>
          <span class="event-detail">${esc(detail)} <span class="num">[${runId}]</span></span>
        </div>`;
      }).join("");

      el.innerHTML = `<div class="events-list">${rows}</div>`;
    }

    function appendLogsTailLines(lines) {
      if (!lines.length) return;
      const output = document.getElementById("logs-tail-output");
      if (!output) return;

      const chunk = lines.join("\n");
      output.value = output.value ? `${output.value}\n${chunk}` : chunk;
      output.scrollTop = output.scrollHeight;
    }

    async function fetchStats() {
      try {
        const res = await fetch("/api/stats");
        const data = await res.json();
        const systemEl = document.getElementById("system-tokens");
        const totalEl = document.getElementById("total-tokens");
        if (systemEl) systemEl.textContent = fmtNum(data.systemTokensSpent ?? 0);
        if (totalEl) totalEl.textContent = fmtNum(data.totalTokensSpent ?? 0);
        document.getElementById("status-dot").classList.remove("error");
      } catch (err) {
        document.getElementById("status-dot").classList.add("error");
        console.error("Failed to fetch stats:", err);
      }
    }

    function fmtNum(n) {
      if (!Number.isFinite(n)) return "0";
      return n.toLocaleString();
    }

    function refreshAll() {
      fetchMcpStatus();
      fetchRuns();
      fetchEvents();
      fetchLogsTail();
      fetchStats();
      document.getElementById("last-update").textContent = new Date().toLocaleTimeString();
    }

    function esc(s) {
      if (!s) return "";
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function timeAgo(iso) {
      if (!iso) return "--";
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    async function pauseRun(id, drain) {
      const qs = drain ? '?drain=true' : '';
      const res = await fetch(`/api/runs/${encodeURIComponent(id)}/pause${qs}`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Failed to pause (${res.status})`);
      }
    }

    async function resumeRun(id) {
      const res = await fetch(`/api/runs/${encodeURIComponent(id)}/resume`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Failed to resume (${res.status})`);
      }
    }

    function handlePause(id) {
      const drain = document.getElementById('drain-checkbox')?.checked || false;
      pauseRun(id, drain).then(refreshAll).catch(e => alert('Pause failed: ' + e.message));
    }

    function handleResume(id) {
      resumeRun(id).then(refreshAll).catch(e => alert('Resume failed: ' + e.message));
    }

    async function pauseAllRuns(drain) {
      const el = document.getElementById('pause-feedback');
      if (!el) return;
      try {
        el.textContent = 'Pausing...';
        const res = await fetch('/api/runs');
        const data = await res.json();
        const runningRuns = (data.runs || []).filter(r => r.status === 'running');
        if (!runningRuns.length) {
          el.textContent = 'No running runs to pause.';
          return;
        }
        let ok = 0;
        for (const r of runningRuns) {
          try { await pauseRun(r.id, drain); ok++; }
          catch (e) { console.error('Failed to pause run ' + r.id, e); }
        }
        el.textContent = `Paused ${ok}/${runningRuns.length} run(s).`;
      } catch (e) {
        el.textContent = 'Error: ' + e.message;
      } finally {
        setTimeout(() => { if (el) el.textContent = ''; }, 4000);
        refreshAll();
      }
    }

    async function resumeAllRuns() {
      const el = document.getElementById('pause-feedback');
      if (!el) return;
      try {
        el.textContent = 'Resuming...';
        const res = await fetch('/api/runs');
        const data = await res.json();
        const pausedRuns = (data.runs || []).filter(r => r.status === 'paused');
        if (!pausedRuns.length) {
          el.textContent = 'No paused runs to resume.';
          return;
        }
        let ok = 0;
        for (const r of pausedRuns) {
          try { await resumeRun(r.id); ok++; }
          catch (e) { console.error('Failed to resume run ' + r.id, e); }
        }
        el.textContent = `Resumed ${ok}/${pausedRuns.length} run(s).`;
      } catch (e) {
        el.textContent = 'Error: ' + e.message;
      } finally {
        setTimeout(() => { if (el) el.textContent = ''; }, 4000);
        refreshAll();
      }
    }

    // Initial load
    refreshAll();

    // Auto-refresh every 10 seconds
    setInterval(refreshAll, 10000);
  </script>
</body>
</html>
