# Formiga ML Pipeline — 5-agent competitive ML workflow
#
# Flow:
#   eda → features → (model-classic ∥ model-advanced) → audit
#
# The two modeler steps share `parallel_group: modelers` so the scheduler
# claims them concurrently. The `audit` step is only eligible after BOTH
# modelers complete (enforced by the prev-step filter in claim.ts).
#
# Inputs are passed via the `task` string as space-separated key=value pairs:
#   formiga workflow run ml-pipeline \
#     'dataset_path=/abs/path/train.csv target_column=price'

id: ml-pipeline
name: ML Pipeline
version: 1
description: |
  Competitive ML pipeline with 5 specialized agents:
  Data Analyst → Feature Engineer → (Modeler Classic ∥ Modeler Advanced) → ML Critic.
  Modelers run in parallel and submit experiments to the leaderboard; the critic
  audits each experiment read-only.

polling:
  model: default
  timeoutSeconds: 1800

run:
  workspace: direct

# Template variables injected into all steps
variables:
  formiga_api: "{{FORMIGA_API_URL}}"

agents:
  - id: data-analyst
    name: Data Analyst
    role: analysis
    description: Rigorous EDA, data quality, and pre-processing recommendations.
    timeoutSeconds: 1200
    workspace:
      baseDir: agents/data-analyst
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/data-analyst/AGENTS.md
        IDENTITY.md: agents/data-analyst/IDENTITY.md
        SOUL.md: agents/data-analyst/SOUL.md

  - id: feature-engineer
    name: Feature Engineer
    role: coding
    description: Builds features, canonical split, and the baseline model.
    timeoutSeconds: 1800
    workspace:
      baseDir: agents/feature-engineer
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/feature-engineer/AGENTS.md
        IDENTITY.md: agents/feature-engineer/IDENTITY.md
        SOUL.md: agents/feature-engineer/SOUL.md

  - id: modeler-classic
    name: Modeler Classic
    role: coding
    description: Gradient boosting, linear, tree-based, SVM/KNN, L1 stacking.
    timeoutSeconds: 3600
    workspace:
      baseDir: agents/modeler-classic
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/modeler-classic/AGENTS.md
        IDENTITY.md: agents/modeler-classic/IDENTITY.md
        SOUL.md: agents/modeler-classic/SOUL.md

  - id: modeler-advanced
    name: Modeler Advanced
    role: coding
    description: Neural nets, AutoML, deep stacking, entity embeddings.
    timeoutSeconds: 3600
    workspace:
      baseDir: agents/modeler-advanced
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/modeler-advanced/AGENTS.md
        IDENTITY.md: agents/modeler-advanced/IDENTITY.md
        SOUL.md: agents/modeler-advanced/SOUL.md

  - id: ml-critic
    name: ML Critic
    role: analysis
    description: Adversarial read-only auditor of every leaderboard experiment.
    timeoutSeconds: 1200
    workspace:
      baseDir: agents/ml-critic
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/ml-critic/AGENTS.md
        IDENTITY.md: agents/ml-critic/IDENTITY.md
        SOUL.md: agents/ml-critic/SOUL.md

steps:
  - id: eda
    agent: data-analyst
    input: |
      Run Exploratory Data Analysis for this run.

      INPUTS:
      - dataset_path: {{dataset_path}}
      - target_column: {{target_column}}
      - run_id: {{run_id}}
      - formiga_api: {{formiga_api}}
      - workspace: {{workspace}}

      Read your AGENTS.md for database API instructions and save artifacts to the database.

      End your output with:
        ARTIFACTS_SAVED: <comma-separated artifact keys>
        KEY_FINDINGS: <one line>
        STATUS: done
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: features
    agent: feature-engineer
    input: |
      Build the canonical feature matrix, split, and baseline model.

      INPUTS:
      - dataset_path: {{dataset_path}}
      - target_column: {{target_column}}
      - run_id: {{run_id}}
      - formiga_api: {{formiga_api}}
      - workspace: {{workspace}}

      Read your AGENTS.md for database API instructions.
      Read EDA artifacts from the database using formiga_read_artifact.
      Save your artifacts to the database using formiga_save_artifact.

      End your output with:
        ARTIFACTS_SAVED: <comma-separated artifact keys>
        FEATURES_SHAPE: <rows>x<cols>
        MODEL_TYPE: baseline-<algorithm>
        CV_MEAN: <float>
        STATUS: done
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: model-classic
    agent: modeler-classic
    parallel_group: modelers
    input: |
      Train classic ML models and submit your best to the leaderboard.

      INPUTS:
      - run_id: {{run_id}}
      - formiga_api: {{formiga_api}}
      - workspace: {{workspace}}

      Read your AGENTS.md for database API instructions.
      Read baseline and features metadata from the database.
      Save trial results and final submission to the database.

      Allowed families: GBM (XGBoost/LightGBM/CatBoost), linear (Ridge/Lasso/EN/LR),
      tree (RF/ExtraTrees), SVM/KNN, L1 stacking.

      End your output with:
        ARTIFACTS_SAVED: <comma-separated artifact keys>
        MODELS_TRAINED: <integer>
        BEST_MODEL_ID: <id>
        MODEL_TYPE: <e.g. lightgbm>
        CV_MEAN: <float>
        STATUS: done
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: model-advanced
    agent: modeler-advanced
    parallel_group: modelers
    input: |
      Train advanced ML systems and submit your best to the leaderboard.

      INPUTS:
      - run_id: {{run_id}}
      - formiga_api: {{formiga_api}}
      - workspace: {{workspace}}

      Read your AGENTS.md for database API instructions.
      Read baseline and features metadata from the database.
      Save trial results and final submission to the database.

      Allowed approaches: MLP, TabNet, FT-Transformer, TabPFN, SAINT, KAN,
      AutoML (with time cap), multi-level stacking, entity embeddings.

      End your output with:
        ARTIFACTS_SAVED: <comma-separated artifact keys>
        MODELS_TRAINED: <integer>
        BEST_MODEL_ID: <id>
        MODEL_TYPE: <e.g. mlp | tabnet | tabpfn>
        CV_MEAN: <float>
        GPU_USED: <true|false>
        STATUS: done
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: audit
    agent: ml-critic
    input: |
      Audit every experiment submitted to the leaderboard for this run.

      INPUTS:
      - run_id: {{run_id}}
      - formiga_api: {{formiga_api}}
      - workspace: {{workspace}}

      Read your AGENTS.md for database API instructions.
      Query the leaderboard and read all artifacts from the database.
      Run the 8 audit checks against every experiment.
      Save audit results to the database.

      You are READ-ONLY for all artifacts other than your own audit artifacts.

      End your output with:
        ARTIFACTS_SAVED: <comma-separated artifact keys>
        TOTAL_SUBMITTED: <integer>
        VALIDATED: <integer>
        REJECTED: <integer>
        FINAL_LEADERBOARD: <one-line summary>
        STATUS: done
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human
