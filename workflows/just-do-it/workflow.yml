# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history and progress files.
id: just-do-it
name: Just Do It
version: 1
description: |
  Analyze user prompts and automatically dispatch to the best-suited bundled workflow.
  Meta-workflow that analyzes user prompts and dispatches to the most
  appropriate workflow for the task. The dispatcher agent studies the
  available workflows, selects the one best suited for what the user asked,
  decides whether to launch it as a no-hurry run, and then itself
  launches a formiga run with the chosen workflow.

  If just-do-it is itself launched as no-hurry, the dispatched workflow
  will always be no-hurry regardless of the user prompt content.
polling:
  model: default
  timeoutSeconds: 120

agents:
  - id: dispatcher
    name: Dispatcher
    role: analysis
    description: Analyzes user prompts, selects the best workflow, and launches runs.
    workspace:
      baseDir: agents/dispatcher
      skills:
        - formiga-agents
      files:
        AGENTS.md: agents/dispatcher/AGENTS.md
        SOUL.md: agents/dispatcher/SOUL.md
        IDENTITY.md: agents/dispatcher/IDENTITY.md

steps:
  - id: dispatch
    agent: dispatcher
    input: |
      Analyze the user's task and dispatch it to the most appropriate workflow.

      TASK:
      {{task}}

      NO_HURRY_SAVE_TOKENS_MODE: {{no_hurry_save_tokens_mode}}

      Instructions:
      1. Discover available workflows: `formiga workflow list --json`
         Parse the JSON output. Each entry has id, name, description.
      2. Analyze the TASK above — what is the user asking for?
      3. Identify the task category using prefix-based matching:
         - "add", "implement", "create", "feature", "build", "new endpoint" → feature-dev*
         - "bug", "fix", "broken", "error", "crash", "regression" → bug-fix*
         - "security", "audit", "vulnerability", "CVE", "scan" → security-audit*
         - "quick question", "format this", "check X", "tell me", "explain",
           or any short discrete task with no coding/PR needed → do-now (standalone)
         - "review my code", "verify", "compare", "check correctness",
           or tasks where the result needs a second-pass check → do-review-do-verify (standalone)
         If the task spans multiple categories, pick the primary one. When in doubt, default to feature-dev*.
      4. Choose the variant by composing a suffix onto the family prefix:
         - Prompt mentions "PR", "pull request", "GitHub" → use -github-pr variant
         - Prompt mentions "merge", "land", "ship" → use variant with -merge
         - Prompt mentions "worktree" → use variant with -worktree
         - Both PR and merge → -github-pr takes precedence (PR flow includes merge)
         - Both PR and worktree → compose -github-pr-worktree
         - Both merge and worktree → compose -merge-worktree
         - Prompt says "no merge" or "no worktree" → base variant (family prefix only, e.g. feature-dev)
         - None of the above → default to -merge-worktree for coding families (feature-dev*, bug-fix*, security-audit*)
         - do-now and do-review-do-verify are standalone: use them directly, no suffix.
         After composing the target ID, verify it exists in the --json output.
         If not found, fall back to the closest available variant from the JSON output
         in order: -merge-worktree → -merge → -worktree → base → -github-pr → -github-pr-worktree.
         If none exist, fall back to do-now as the universal catch-all.
      5. Decide no-hurry mode:
         - If {{no_hurry_save_tokens_mode}} is true, launch the dispatched workflow
           with --no-hurry-please-save-tokens-mode ALWAYS (parent was no-hurry)
         - If {{no_hurry_save_tokens_mode}} is false, detect urgency from the user's
           prompt: markers like "URGENT", "ASAP", "immediately", "right now", "as fast
           as possible" indicate normal (fast) mode; polite or casual language
           ("when you get a chance", "no rush", "whenever") indicates no-hurry
         - Default: normal mode unless urgency markers are absent AND the prompt
           tone is relaxed
      6. Resolve the target workspace:
         - The target_working_directory_for_harness context variable holds the repo
           path to pass to the child workflow.
         - If {{target_working_directory_for_harness}} is empty or not set, use the
           current directory as the default target.
      7. Launch the run:
         - Task text is positional after the workflow ID, never use --task flag.
         - For direct child workflows (no -worktree suffix):
           `formiga workflow run <selected-workflow-id> "<the user's original task>" --working-directory-for-harness "{{target_working_directory_for_harness}}"`
         - For worktree child workflows (-worktree suffix):
           `formiga workflow run <selected-workflow-id> "<the user's original task>" --worktree-origin-repository "{{target_working_directory_for_harness}}"`
         - If target_working_directory_for_harness is empty, omit the workspace flag
           and let the child default to the current directory.
         - If no-hurry was decided, add `--no-hurry-please-save-tokens-mode` to the command.
         - Capture the RUN_ID from the output.
      8. Failure behavior:
         - Variant fallback (trying the next variant) is ONLY for static workflow ID
           availability in `formiga workflow list --json` output — when the composed
           ID does not appear in the list at all.
         - If a workflow ID exists in the list but `formiga workflow run` fails for
           any runtime reason (daemon registration failure, scheduling conflict,
           invalid parameters, etc.), that is FATAL. Do NOT try fallback workflows.
           Report failure immediately with `formiga step fail`.
         - You MUST always call either `formiga step complete` (on success) or
           `formiga step fail` (on failure) before exiting. Never exit without reporting.
      9. Report what you did

      Reply with:
      STATUS: done
      SELECTED_WORKFLOW: <workflow-id you chose>
      NO_HURRY: <true|false>
      REASONING: <why you chose this workflow and no-hurry decision>
      LAUNCHED_RUN_ID: <the run ID from formiga workflow run>
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human
