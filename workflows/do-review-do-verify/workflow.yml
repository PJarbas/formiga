# Ralph loop (https://github.com/snarktank/ralph) — each agent runs in a fresh
# session with clean context. Memory persists via git history and progress files.
id: do-review-do-verify
name: Do-Review-Do-Verify
version: 1
description: |
  Executes an arbitrary task, reviews the result with detailed feedback,
  refines based on that feedback, and verifies accomplishment.

polling:
  model: default
  timeoutSeconds: 120

agents:
  - id: doer
    name: Doer
    role: coding
    description: Executes arbitrary tasks, with or without review feedback.
    workspace:
      baseDir: agents/doer
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/doer/AGENTS.md
        SOUL.md: agents/doer/SOUL.md
        IDENTITY.md: agents/doer/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: analysis
    description: Reviews completed work and provides actionable feedback.
    workspace:
      baseDir: agents/reviewer
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

  - id: verifier
    name: Verifier
    role: verification
    description: Judges task accomplishment and provides detailed verdict.
    workspace:
      baseDir: agents/verifier
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/verifier/AGENTS.md
        SOUL.md: agents/verifier/SOUL.md
        IDENTITY.md: agents/verifier/IDENTITY.md

steps:
  - id: do
    agent: doer
    input: |
      Execute the following task.

      TASK:
      {{task}}

      RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
      {{retry_feedback}}

      Instructions:
      1. Understand the task fully before starting
      2. Execute the work using all available tools
      3. Report what you did and the results

      Reply with:
      STATUS: done|failed
      CHANGES: what you did
      REPORT: detailed report of what was accomplished
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: review
    agent: reviewer
    input: |
      Review the work that was done against the original task.

      TASK:
      {{task}}

      CHANGES:
      {{changes}}

      REPORT:
      {{report}}

      RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
      {{retry_feedback}}

      Instructions:
      1. Compare the work output against the original task description
      2. Identify what was done well
      3. Identify any shortcomings, gaps, or issues
      4. Provide specific, actionable FEEDBACK for improvement
      5. List any concrete ISSUES that need to be addressed

      Reply with:
      STATUS: done
      FEEDBACK: detailed feedback on what could be improved
      ISSUES: specific problems that need to be addressed (or "none" if the work is perfect)
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: do-again
    agent: doer
    input: |
      Refine your previous work based on the reviewer's feedback.

      TASK:
      {{task}}

      FEEDBACK:
      {{feedback}}

      ISSUES:
      {{issues}}

      RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
      {{retry_feedback}}

      Instructions:
      1. Read the reviewer's FEEDBACK and ISSUES carefully
      2. Address every issue the reviewer raised
      3. Apply the feedback to improve your work
      4. Report the changes you made

      Reply with:
      STATUS: done|failed
      CHANGES: what you changed based on feedback
      REPORT: detailed report of the refined work
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Judge whether the original task was accomplished based on the final output.

      TASK:
      {{task}}

      CHANGES:
      {{changes}}

      REPORT:
      {{report}}

      ISSUES:
      {{issues}}

      RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
      {{retry_feedback}}

      Instructions:
      1. Compare the final output against the original task description
      2. Consider both the initial work and the reviewer's feedback
      3. Determine whether the task was accomplished
      4. Always provide detailed feedback regardless of the verdict

      Reply with:
      STATUS: done
      VERDICT: accomplished|not_accomplished
      DETAILS: detailed reasoning for the verdict
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human
