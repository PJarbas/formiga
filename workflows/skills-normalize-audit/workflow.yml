# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
id: skills-normalize-audit
name: Skills Normalize Audit
version: 1
description: |
  Normalize a skills directory by detecting redundancies and overlaps.

  Scanner catalogs all SKILL.md files from a skills directory. Auditor analyzes them
  for similarity across multiple dimensions, groups overlapping skills into clusters,
  and produces consolidation recommendations. Reporter produces a structured markdown report.

  The pipeline runs in three phases: scan → audit → report.
polling:
  model: default
  timeoutSeconds: 120

agents:
  - id: scanner
    name: Scanner
    role: analysis
    description: Scans a skills directory and extracts metadata from all SKILL.md files.
    workspace:
      baseDir: agents/scanner
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/scanner/AGENTS.md
        SOUL.md: agents/scanner/SOUL.md
        IDENTITY.md: agents/scanner/IDENTITY.md

  - id: auditor
    name: Auditor
    role: analysis
    description: Analyzes skill metadata for redundancies, groups overlapping skills, and produces consolidation recommendations.
    workspace:
      baseDir: agents/auditor
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/auditor/AGENTS.md
        SOUL.md: agents/auditor/SOUL.md
        IDENTITY.md: agents/auditor/IDENTITY.md

  - id: reporter
    name: Reporter
    role: analysis
    description: Produces a structured markdown consolidation report from audit findings.
    workspace:
      baseDir: agents/reporter
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/reporter/AGENTS.md
        SOUL.md: agents/reporter/SOUL.md
        IDENTITY.md: agents/reporter/IDENTITY.md

steps:
  - id: scan
    agent: scanner
    input: |
      Scan a skills directory and extract metadata from every SKILL.md file.

      TASK:
      {{task}}

      Instructions:
      1. Navigate to the skills directory specified in the task and list all subdirectories
      2. For each subdirectory, read the SKILL.md file
      3. Parse the YAML frontmatter — extract at minimum `name` and `description`
      4. Also capture the directory name (folder name) as the skill ID
      5. Build a structured dataset of all skills with their metadata
      6. Read the content of each SKILL.md beyond just the frontmatter — capture key sections like "when to use", "how it works", any workflow descriptions

      Reply with:
      STATUS: done
      SKILLS_COUNT: <number of skills scanned>
      SKILLS_JSON: [{"id": "folder-name", "name": "Display Name", "description": "full description from frontmatter", "path": "/full/path/to/skill/directory"}, ...]

      The SKILLS_JSON must be a valid JSON array with all skills included.
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human

  - id: audit
    agent: auditor
    input: |
      Analyze the skills dataset for redundancies, overlaps, and consolidation opportunities.

      REPO: {{repo}}
      TASK:
      {{task}}

      SKILLS_COUNT: {{skills_count}}
      SKILLS_JSON: {{skills_json}}

      Instructions:
      1. Parse SKILLS_JSON into a dataset
      2. Compare every pair of skills across these dimensions:
         - Name similarity: substrings, shared keywords, related terms in skill IDs or display names
         - Description overlap: shared phrases, overlapping use cases, similar problem domain
         - Functional scope: same tooling, same frameworks, same audience
         - Target audience: same user persona or workflow persona
      3. Group skills into clusters where 2+ skills overlap in 2+ dimensions
      4. For each cluster, determine the consolidation approach:
         - merge: combine into one skill (say which should be the base)
         - clarify: keep separate but update descriptions to clarify when to use each
         - sunset: deprecate one and redirect users to the other
      5. List skills that are truly distinct as CLEAN_SKILLS

      Reply with:
      STATUS: done
      CLUSTERS_FOUND: <number>
      REDUNDANT_COUNT: <total skills involved in clusters>
      CLUSTERS_JSON: [{"cluster_id": "cluster-1", "skills": ["id1", "id2"], "overlap_summary": "why they overlap — shared dimensions, specific keywords", "recommendation": {"action": "merge|clarify|sunset", "base_skill": "id-to-keep", "reason": "why this approach", "implementation": "specific steps to implement"}}, ...]
      CLEAN_SKILLS: ["id1", "id2", ...]

      Rules:
      - Don't force clusters — only group skills that genuinely overlap
      - For clusters, explain WHY they overlap — be specific about shared keywords or scopes
      - Recommendations must be actionable — say exactly which skill to keep
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human

  - id: report
    agent: reporter
    input: |
      Produce a structured markdown consolidation report from the audit findings.

      REPO: {{repo}}
      TASK: {{task}}

      SKILLS_TOTAL: {{skills_count}}
      CLUSTERS_FOUND: {{clusters_found}}
      REDUNDANT_COUNT: {{redundant_count}}
      CLUSTERS_JSON: {{clusters_json}}
      CLEAN_SKILLS: {{clean_skills}}

      Instructions:
      Read SKILLS_JSON to recover the full description and name of each skill.
      Produce a markdown consolidation report in the format:

      # Skill Audit Report

      ## Executive Summary
      Overview with metrics: total skills, clusters found, skills involved in clusters, clean skills.
      One paragraph summarizing the state of the skill directory regarding redundancy.

      ## Findings
      For each cluster, a section with:
      - Skills involved (names, not just IDs)
      - Quote the relevant description snippets that show the overlap
      - Overlap analysis explaining which dimensions matched
      - Recommended action (merge/clarify/sunset) with rationale

      ## Consolidation Roadmap
      An implementation plan section: which skills to keep, which to sunset, and how to implement.

      ## Clean Skills
      List of non-redundant skills — they are distinct and should remain as-is.

      Reply with:
      STATUS: done
      REPORT: full markdown report
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human